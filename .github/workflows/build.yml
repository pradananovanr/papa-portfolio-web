name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            --tag papa-portfolio:${{ github.sha }} \
            --tag ghcr.io/pradananovanr/papa-portfolio:latest \
            .

      - name: Run container health check
        run: |
          docker run -d --name test-portfolio -p 8888:80 papa-portfolio:${{ github.sha }}
          sleep 5
          curl -sf http://localhost:8888 > /dev/null && echo "✓ Site responds" || { echo "✗ Site not reachable"; docker logs test-portfolio; exit 1; }
          docker stop test-portfolio

  # Optional: push to GHCR on main branch push
  push:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          docker build \
            --tag ghcr.io/pradananovanr/papa-portfolio:${{ github.sha }} \
            --tag ghcr.io/pradananovanr/papa-portfolio:latest \
            --push \
            .
